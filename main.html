<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>動物森友會 2D - 我的島嶼大廳</title>
    <style>
        * { box-sizing: border-box; -webkit-user-select: none; user-select: none; }
        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: #e8f5e9;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100dvh;
            overflow: hidden;
        }
        
        .top-bar {
            width: 100%;
            max-width: 600px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #fff;
            padding: 10px 15px;
            border: 4px solid #8d6e63;
            border-radius: 15px;
            margin-bottom: 8px;
        }
        .user-info { font-size: 16px; font-weight: bold; color: #5d4037; }
        .money-box { font-size: 18px; font-weight: bold; color: #e65100; background: #ffe0b2; padding: 5px 12px; border-radius: 20px; border: 2px solid #f57c00; }
        .btn-top { background: #bcaaa4; color: white; border: 2px solid #5d4037; border-radius: 8px; padding: 6px 12px; font-weight: bold; cursor: pointer; }
        
        .char-panel {
            width: 100%;
            max-width: 600px;
            background: #fff8e1;
            border: 4px solid #bcaaa4;
            border-radius: 15px;
            padding: 10px;
            margin-bottom: 8px;
            display: flex;
            gap: 10px;
            overflow-x: auto;
        }
        .char-thumb {
            flex: 0 0 auto;
            border: 3px solid #d7ccc8;
            border-radius: 12px;
            padding: 6px 12px;
            text-align: center;
            cursor: pointer;
            background: white;
            min-width: 75px;
        }
        .char-thumb.active { border-color: #ff9800; background: #fff3e0; }
        .char-avatar { font-size: 26px; }
        .char-name { font-size: 12px; font-weight: bold; color: #5d4037; margin-top: 2px; }

        .game-stage {
            position: relative;
            width: 100%;
            max-width: 600px;
            aspect-ratio: 1;
            background-color: #8bc34a;
            background-image: 
                linear-gradient(rgba(255,255,255,0.15) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.15) 1px, transparent 1px);
            background-size: 12.5% 12.5%;
            border: 6px solid #4caf50;
            border-radius: 18px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.15);
        }

        .world-item {
            position: absolute;
            width: 12.5%;
            height: 12.5%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 35px;
            z-index: 5;
            transition: transform 0.2s, top 0.2s ease-out, left 0.2s ease-out;
        }
        .world-item::after {
            content: attr(data-label);
            position: absolute;
            bottom: -2px;
            font-size: 10px;
            font-weight: bold;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 1px 4px;
            border-radius: 5px;
            white-space: nowrap;
        }
        .world-item.highlight {
            transform: scale(1.25);
            filter: drop-shadow(0 0 10px #fff200);
        }

        #playerCharacter {
            position: absolute;
            width: 12.5%;
            height: 12.5%;
            font-size: 45px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            cursor: grab;
            transition: left 0.1s ease-out, top 0.1s ease-out;
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.3));
            touch-action: none;
        }
        #playerCharacter:active { cursor: grabbing; transform: scale(1.15); }
        #playerCharacter::after {
            content: "你";
            position: absolute;
            top: -5px;
            font-size: 10px;
            font-weight: bold;
            background: #ff5722;
            color: white;
            padding: 1px 4px;
            border-radius: 5px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 100;
            align-items: center; justify-content: center;
        }
        .modal-content {
            background: white; border: 6px solid #5d4037; border-radius: 20px;
            padding: 25px; width: 90%; max-width: 450px; text-align: center;
        }
        .modal-btn {
            background: #4caf50; color: white; border: none; padding: 12px 25px;
            font-size: 18px; border-radius: 10px; cursor: pointer; margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <button class="btn-top" onclick="window.location.href='index.html'">↩ 換帳號</button>
        <div class="user-info">島主：<span id="lblUser">未登入</span></div>
        <div class="money-box">💰 $<span id="lblMoney">0</span></div>
        <button class="btn-top" onclick="saveGame()">💾 儲存</button>
    </div>

    <div class="char-panel" id="charPanel"></div>

    <div class="game-stage" id="gameStage">
        
        <div id="playerCharacter">🐻</div>
        
        <div class="world-item" id="obj-owl" data-label="傅達🦉" style="top: 12.5%; left: 25%;">🦉</div>
        <div class="world-item" id="obj-pet" data-label="小貓寵物🐱" style="top: 25%; left: 62.5%;">🐱</div>
        <div class="world-item" id="obj-arcade" data-label="遊戲機🕹️" style="top: 62.5%; left: 12.5%;">🕹️</div>
        <div class="world-item" id="obj-house" data-label="我的房子🏡" style="top: 62.5%; left: 62.5%;">🏡</div>

    </div>

    <div class="modal" id="quizModal">
        <div class="modal-content">
            <h2 style="color: #795548;">🦉 傅達的學術問答</h2>
            <p id="quizText" style="font-size: 18px; margin: 20px 0; color: #333; font-weight: bold;"></p>
            <button class="modal-btn" onclick="closeQuiz()">太棒了！</button>
        </div>
    </div>

    <script>
        const currentUser = sessionStorage.getItem('AC_Current_User') || 'Guest';
        document.getElementById('lblUser').innerText = currentUser;

        const characters = [
            { id: 1, name: '小熊', icon: '🐻' },
            { id: 2, name: '小狗', icon: '🐶' },
            { id: 3, name: '小貓', icon: '🐱' },
            { id: 4, name: '小兔', icon: '🐰' },
            { id: 5, name: '小鹿', icon: '🦌' },
            { id: 6, name: '小羊', icon: '🐑' },
            { id: 7, name: '小松鼠', icon: '🐿️' },
            { id: 8, name: '小鴨', icon: '🦆' }
        ];

        let itemPositions = {
            owl: { x: 2, y: 1 },
            pet: { x: 5, y: 2 },
            arcade: { x: 1, y: 5 },
            house: { x: 5, y: 5 }
        };

        let gameState = {
            money: 100,
            selectedCharId: 1,
            playerGridX: 3, 
            playerGridY: 3  
        };

        function loadGame() {
            const saved = localStorage.getItem('AC_Save_' + currentUser);
            if (saved) {
                gameState = JSON.parse(saved);
            }
            document.getElementById('lblMoney').innerText = gameState.money;
            renderCharPanel();
            updatePlayerIcon();
            
            // 使用純百分比定位，就算寬高還沒跑出來也絕對不會出錯卡死
            alignToGrid("playerCharacter", gameState.playerGridX, gameState.playerGridY);
            alignAllObjects();
        }

        function saveGame() {
            localStorage.setItem('AC_Save_' + currentUser, JSON.stringify(gameState));
            alert('島嶼進度已成功儲存！');
        }

        function renderCharPanel() {
            const panel = document.getElementById('charPanel');
            panel.innerHTML = '';
            characters.forEach(char => {
                const thumb = document.createElement('div');
                thumb.className = `char-thumb ${gameState.selectedCharId === char.id ? 'active' : ''}`;
                thumb.innerHTML = `
                    <div class="char-avatar">${char.icon}</div>
                    <div class="char-name">${char.name}</div>
                `;
                thumb.onclick = () => {
                    gameState.selectedCharId = char.id;
                    renderCharPanel();
                    updatePlayerIcon();
                    saveGame();
                };
                panel.appendChild(thumb);
            });
        }

        function updatePlayerIcon() {
            const curChar = characters.find(c => c.id === gameState.selectedCharId);
            document.getElementById('playerCharacter').innerText = curChar ? curChar.icon : '🐻';
        }

        function alignToGrid(elementId, gx, gy) {
            const el = document.getElementById(elementId);
            if (!el) return;
            el.style.left = (gx * 12.5) + '%';
            el.style.top = (gy * 12.5) + '%';
        }

        function alignAllObjects() {
            alignToGrid("obj-owl", itemPositions.owl.x, itemPositions.owl.y);
            alignToGrid("obj-pet", itemPositions.pet.x, itemPositions.pet.y);
            alignToGrid("obj-arcade", itemPositions.arcade.x, itemPositions.arcade.y);
            alignToGrid("obj-house", itemPositions.house.x, itemPositions.house.y);
        }

        // --- 拖曳系統 ---
        const playerEl = document.getElementById('playerCharacter');
        const stageEl = document.getElementById('gameStage');
        let isDragging = false;
        let startX, startY, initLeft, initTop;

        playerEl.addEventListener('mousedown', dragStart);
        playerEl.addEventListener('touchstart', dragStart, { passive: false });

        function dragStart(e) {
            isDragging = true;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            startX = clientX;
            startY = clientY;
            initLeft = playerEl.offsetLeft;
            initTop = playerEl.offsetTop;
            
            document.addEventListener('mousemove', dragMove);
            document.addEventListener('touchmove', dragMove, { passive: false });
            document.addEventListener('mouseup', dragEnd);
            document.addEventListener('touchend', dragEnd);
        }

        function dragMove(e) {
            if (!isDragging) return;
            if (e.cancelable) e.preventDefault(); 
            
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            const dx = clientX - startX;
            const dy = clientY - startY;
            
            playerEl.style.left = (initLeft + dx) + 'px';
            playerEl.style.top = (initTop + dy) + 'px';
        }

        function dragEnd(e) {
            if (!isDragging) return;
            isDragging = false;
            
            document.removeEventListener('mousemove', dragMove);
            document.removeEventListener('touchmove', dragMove);
            
            const cellWidth = stageEl.clientWidth / 8;
            const cellHeight = stageEl.clientHeight / 8;
            
            let targetX = Math.round(playerEl.offsetLeft / cellWidth);
            let targetY = Math.round(playerEl.offsetTop / cellHeight);
            
            targetX = Math.max(0, Math.min(targetX, 7));
            targetY = Math.max(0, Math.min(targetY, 7));
            
            gameState.playerGridX = targetX;
            gameState.playerGridY = targetY;
            alignToGrid("playerCharacter", targetX, targetY);
            
            checkProximityInteraction(targetX, targetY);
        }

        function checkProximityInteraction(px, py) {
            document.querySelectorAll('.world-item').forEach(el => el.classList.remove('highlight'));

            Object.keys(itemPositions).forEach(key => {
                const pos = itemPositions[key];
                const diffX = Math.abs(pos.x - px);
                const diffY = Math.abs(pos.y - py);
                
                // 只要角色被拉到目標物件的相鄰格（1格之內），即刻高亮並觸發殼
                if (diffX <= 1 && diffY <= 1) {
                    const itemDom = document.getElementById(`obj-${key}`);
                    if (itemDom) itemDom.classList.add('highlight');
                    
                    setTimeout(() => { triggerAction(key); }, 150);
                }
            });
        }

        function triggerAction(objectName) {
            switch (objectName) {
                case 'owl':
                    document.getElementById('quizText').innerText = "哈囉！我是傅達！多帳號與地圖物件目前全部就緒囉！";
                    document.getElementById('quizModal').style.display = 'flex';
                    break;
                case 'pet':
                    window.location.href = 'pet.html';
                    break;
                case 'arcade':
                    window.location.href = 'tetris.html';
                    break;
                case 'house':
                    window.location.href = 'house.html';
                    break;
            }
        }

        function closeQuiz() {
            document.getElementById('quizModal').style.display = 'none';
        }

        function startPetRoaming() {
            setInterval(() => {
                const directions = [{x:0, y:1}, {x:0, y:-1}, {x:1, y:0}, {x:-1, y:0}];
                const randomMove = directions[Math.floor(Math.random() * directions.length)];
                
                let nextX = itemPositions.pet.x + randomMove.x;
                let nextY = itemPositions.pet.y + randomMove.y;
                
                if (nextX >= 0 && nextX <= 7 && nextY >= 0 && nextY <= 7) {
                    const isOverlap = (nextX === itemPositions.owl.x && nextY === itemPositions.owl.y) ||
                                      (nextX === itemPositions.arcade.x && nextY === itemPositions.arcade.y) ||
                                      (nextX === itemPositions.house.x && nextY === itemPositions.house.y);
                    
                    if (!isOverlap) {
                        itemPositions.pet.x = nextX;
                        itemPositions.pet.y = nextY;
                        alignToGrid("obj-pet", nextX, nextY);
                        
                        checkProximityInteraction(gameState.playerGridX, gameState.playerGridY);
                    }
                }
            }, 3000); 
        }

        window.onload = function() {
            loadGame();
            startPetRoaming();
        };
    </script>
</body>
</html>
