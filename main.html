<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>動物森友會 2D - 我的島嶼大廳</title>
    <style>
        * { box-sizing: border-box; -webkit-user-select: none; user-select: none; }
        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: #e8f5e9;
            margin: 0;
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100dvh;
            overflow-x: hidden;
        }
        
        .top-bar {
            width: 100%;
            max-width: 720px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #fff;
            padding: 12px 18px;
            border: 4px solid #8d6e63;
            border-radius: 15px;
            margin-bottom: 10px;
        }
        .user-info { font-size: 18px; font-weight: bold; color: #5d4037; }
        .money-box { font-size: 20px; font-weight: bold; color: #e65100; background: #ffe0b2; padding: 6px 14px; border-radius: 20px; border: 2px solid #f57c00; }
        .btn-top { background: #bcaaa4; color: white; border: 2px solid #5d4037; border-radius: 8px; padding: 8px 14px; font-weight: bold; cursor: pointer; font-size: 15px; }
        
        .char-panel {
            width: 100%;
            max-width: 720px;
            background: #fff8e1;
            border: 4px solid #bcaaa4;
            border-radius: 15px;
            padding: 10px 14px;
            margin-bottom: 10px;
            display: flex;
            gap: 10px;
            overflow-x: auto;
        }
        .char-thumb {
            flex: 0 0 auto;
            border: 3px solid #d7ccc8;
            border-radius: 12px;
            padding: 8px 14px;
            text-align: center;
            cursor: pointer;
            background: white;
            min-width: 80px;
        }
        .char-thumb.active { border-color: #ff9800; background: #fff3e0; }
        .char-avatar { font-size: 30px; }
        .char-name { font-size: 13px; font-weight: bold; color: #5d4037; margin-top: 3px; }

        .game-stage {
            position: relative;
            width: 100%;
            max-width: 720px;
            aspect-ratio: 1;
            background-color: #8bc34a;
            background-image: 
                linear-gradient(rgba(255,255,255,0.15) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.15) 1px, transparent 1px);
            background-size: 12.5% 12.5%;
            border: 6px solid #4caf50;
            border-radius: 18px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.15);
            touch-action: none;
        }

        .world-item {
            position: absolute;
            width: 12.5%;
            height: 12.5%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            z-index: 5;
            transition: transform 0.2s, top 0.2s ease-out, left 0.2s ease-out;
            cursor: pointer;
        }
        .world-item::after {
            content: attr(data-label);
            position: absolute;
            bottom: -2px;
            font-size: 11px;
            font-weight: bold;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 2px 5px;
            border-radius: 5px;
            white-space: nowrap;
        }
        .world-item.highlight {
            transform: scale(1.3);
            filter: drop-shadow(0 0 12px #fff200);
            animation: pulse 0.8s infinite alternate;
        }
        @keyframes pulse {
            from { filter: drop-shadow(0 0 8px #fff200); }
            to   { filter: drop-shadow(0 0 18px #ff9800); }
        }

        /* 靠近提示泡泡 */
        .world-item.highlight::before {
            content: "點我互動！";
            position: absolute;
            top: -28px;
            left: 50%;
            transform: translateX(-50%);
            background: #ff5722;
            color: white;
            font-size: 11px;
            font-weight: bold;
            padding: 3px 7px;
            border-radius: 8px;
            white-space: nowrap;
            z-index: 20;
        }

        #playerCharacter {
            position: absolute;
            width: 12.5%;
            height: 12.5%;
            font-size: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            cursor: grab;
            transition: left 0.1s ease-out, top 0.1s ease-out;
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.3));
            touch-action: none;
        }
        #playerCharacter:active { cursor: grabbing; transform: scale(1.15); }
        #playerCharacter::after {
            content: "你";
            position: absolute;
            top: -5px;
            font-size: 11px;
            font-weight: bold;
            background: #ff5722;
            color: white;
            padding: 2px 5px;
            border-radius: 5px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 100;
            align-items: center; justify-content: center;
        }
        .modal-content {
            background: white; border: 6px solid #5d4037; border-radius: 20px;
            padding: 30px; width: 90%; max-width: 500px; text-align: center;
        }
        .modal-btn {
            background: #4caf50; color: white; border: none; padding: 14px 30px;
            font-size: 20px; border-radius: 10px; cursor: pointer; margin-top: 15px;
        }
        .weed {
            position: absolute; width: 12.5%; height: 12.5%;
            display: flex; justify-content: center; align-items: center;
            font-size: 36px; z-index: 6; cursor: pointer;
            animation: weedPop 0.3s ease;
            -webkit-tap-highlight-color: transparent;
        }
        .weed::after {
            content: "+$5"; position: absolute; bottom: -2px;
            font-size: 11px; font-weight: bold;
            background: #388e3c; color: white; padding: 2px 5px; border-radius: 5px;
        }
        .weed:active { transform: scale(1.3); }
        @keyframes weedPop { 0%{transform:scale(0);opacity:0} 70%{transform:scale(1.2)} 100%{transform:scale(1);opacity:1} }
        .coin-float {
            position: fixed; pointer-events: none;
            font-size: 22px; font-weight: bold; color: #388e3c;
            z-index: 999; animation: coinUp 1s ease forwards;
        }
        @keyframes coinUp { 0%{opacity:1;transform:translateY(0)} 100%{opacity:0;transform:translateY(-60px)} }
    </style>
</head>
<body>

    <div class="top-bar">
        <button class="btn-top" onclick="window.location.href='index.html'">↩ 換帳號</button>
        <div class="user-info">島主：<span id="lblUser">未登入</span></div>
        <div class="money-box">💰 $<span id="lblMoney">0</span></div>
        <button class="btn-top" onclick="saveGame()">💾 儲存</button>
    </div>

    <div class="char-panel" id="charPanel"></div>

    <div class="game-stage" id="gameStage">
        
        <div id="playerCharacter">🐻</div>
        
        <div class="world-item" id="obj-owl" data-label="傅達🦉" data-key="owl">🦉</div>
        <div class="world-item" id="obj-pet" data-label="小貓寵物🐱" data-key="pet">🐱</div>
        <div class="world-item" id="obj-arcade" data-label="遊戲機🕹️" data-key="arcade">🕹️</div>
        <div class="world-item" id="obj-house" data-label="我的房子🏡" data-key="house">🏡</div>

    </div>

    <div class="modal" id="quizModal">
        <div class="modal-content">
            <h2 style="color: #795548;">🦉 傅達的學術問答</h2>
            <p id="quizText" style="font-size: 20px; margin: 20px 0; color: #333; font-weight: bold;"></p>
            <button class="modal-btn" onclick="closeQuiz()">太棒了！</button>
        </div>
    </div>

    <script>
        const currentUser = sessionStorage.getItem('AC_Current_User') || 'Guest';
        document.getElementById('lblUser').innerText = currentUser;

        const characters = [
            { id: 1, name: '小熊', icon: '🐻' },
            { id: 2, name: '小狗', icon: '🐶' },
            { id: 3, name: '小貓', icon: '🐱' },
            { id: 4, name: '小兔', icon: '🐰' },
            { id: 5, name: '小鹿', icon: '🦌' },
            { id: 6, name: '小羊', icon: '🐑' },
            { id: 7, name: '小松鼠', icon: '🐿️' },
            { id: 8, name: '小鴨', icon: '🦆' }
        ];

        let itemPositions = {
            owl:    { x: 2, y: 1 },
            pet:    { x: 5, y: 2 },
            arcade: { x: 1, y: 5 },
            house:  { x: 5, y: 5 }
        };

        let gameState = {
            money: 100,
            selectedCharId: 1,
            playerGridX: 3,
            playerGridY: 3
        };

        // 記錄目前哪些物件在範圍內（高亮中）
        let nearbyItems = new Set();

        function loadGame() {
            const saved = localStorage.getItem('AC_Save_' + currentUser);
            if (saved) gameState = JSON.parse(saved);
            document.getElementById('lblMoney').innerText = gameState.money;
            renderCharPanel();
            updatePlayerIcon();
            alignToGrid("playerCharacter", gameState.playerGridX, gameState.playerGridY);
            alignAllObjects();
        }

        function saveGame() {
            localStorage.setItem('AC_Save_' + currentUser, JSON.stringify(gameState));
            alert('島嶼進度已成功儲存！');
        }

        function renderCharPanel() {
            const panel = document.getElementById('charPanel');
            panel.innerHTML = '';
            characters.forEach(char => {
                const thumb = document.createElement('div');
                thumb.className = `char-thumb ${gameState.selectedCharId === char.id ? 'active' : ''}`;
                thumb.innerHTML = `<div class="char-avatar">${char.icon}</div><div class="char-name">${char.name}</div>`;
                thumb.onclick = () => {
                    gameState.selectedCharId = char.id;
                    renderCharPanel();
                    updatePlayerIcon();
                    saveGame();
                };
                panel.appendChild(thumb);
            });
        }

        function updatePlayerIcon() {
            const curChar = characters.find(c => c.id === gameState.selectedCharId);
            document.getElementById('playerCharacter').innerText = curChar ? curChar.icon : '🐻';
        }

        function alignToGrid(elementId, gx, gy) {
            const el = document.getElementById(elementId);
            if (!el) return;
            el.style.left = (gx * 12.5) + '%';
            el.style.top  = (gy * 12.5) + '%';
        }

        function alignAllObjects() {
            alignToGrid("obj-owl",    itemPositions.owl.x,    itemPositions.owl.y);
            alignToGrid("obj-pet",    itemPositions.pet.x,    itemPositions.pet.y);
            alignToGrid("obj-arcade", itemPositions.arcade.x, itemPositions.arcade.y);
            alignToGrid("obj-house",  itemPositions.house.x,  itemPositions.house.y);
        }

        // --- 拖曳系統 ---
        const playerEl = document.getElementById('playerCharacter');
        const stageEl  = document.getElementById('gameStage');
        let isDragging = false;
        let startX, startY, initLeft, initTop;

        playerEl.addEventListener('mousedown',  dragStart);
        playerEl.addEventListener('touchstart', dragStart, { passive: false });

        function dragStart(e) {
            isDragging = true;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            startX = clientX;
            startY = clientY;
            initLeft = playerEl.offsetLeft;
            initTop  = playerEl.offsetTop;
            document.addEventListener('mousemove',  dragMove);
            document.addEventListener('touchmove',  dragMove, { passive: false });
            document.addEventListener('mouseup',    dragEnd);
            document.addEventListener('touchend',   dragEnd);
        }

        function dragMove(e) {
            if (!isDragging) return;
            if (e.cancelable) e.preventDefault();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            playerEl.style.left = (initLeft + clientX - startX) + 'px';
            playerEl.style.top  = (initTop  + clientY - startY) + 'px';
        }

        function dragEnd(e) {
            if (!isDragging) return;
            isDragging = false;
            document.removeEventListener('mousemove', dragMove);
            document.removeEventListener('touchmove', dragMove);

            const cellW = stageEl.clientWidth  / 8;
            const cellH = stageEl.clientHeight / 8;
            let targetX = Math.round(playerEl.offsetLeft / cellW);
            let targetY = Math.round(playerEl.offsetTop  / cellH);
            targetX = Math.max(0, Math.min(targetX, 7));
            targetY = Math.max(0, Math.min(targetY, 7));

            gameState.playerGridX = targetX;
            gameState.playerGridY = targetY;
            alignToGrid("playerCharacter", targetX, targetY);

            checkProximity(targetX, targetY);
        }

        // 只做高亮，不自動觸發
        function checkProximity(px, py) {
            document.querySelectorAll('.world-item').forEach(el => el.classList.remove('highlight'));
            nearbyItems.clear();

            Object.keys(itemPositions).forEach(key => {
                const pos  = itemPositions[key];
                const diffX = Math.abs(pos.x - px);
                const diffY = Math.abs(pos.y - py);
                if (diffX <= 1 && diffY <= 1) {
                    const itemDom = document.getElementById(`obj-${key}`);
                    if (itemDom) itemDom.classList.add('highlight');
                    nearbyItems.add(key);
                }
            });
        }

        // 點擊物件才觸發
        document.querySelectorAll('.world-item').forEach(el => {
            el.addEventListener('click',      () => handleItemClick(el.dataset.key));
            el.addEventListener('touchend',   (e) => { e.preventDefault(); handleItemClick(el.dataset.key); }, { passive: false });
        });

        function handleItemClick(key) {
            if (!nearbyItems.has(key)) {
                // 不在範圍內，給提示
                showToast('先走過去靠近它喔！');
                return;
            }
            triggerAction(key);
        }

        function triggerAction(objectName) {
            switch (objectName) {
                case 'owl':
                    document.getElementById('quizText').innerText = "哈囉！我是傅達！多帳號與地圖物件目前全部就緒囉！";
                    document.getElementById('quizModal').style.display = 'flex';
                    break;
                case 'pet':
                    window.location.href = 'pet.html';
                    break;
                case 'arcade':
                    window.location.href = 'tetris.html';
                    break;
                case 'house':
                    window.location.href = 'house.html';
                    break;
            }
        }

        function closeQuiz() {
            document.getElementById('quizModal').style.display = 'none';
        }

        // 小提示 Toast
        function showToast(msg) {
            let toast = document.getElementById('toast');
            if (!toast) {
                toast = document.createElement('div');
                toast.id = 'toast';
                toast.style.cssText = `
                    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
                    background: rgba(0,0,0,0.75); color: white; padding: 10px 22px;
                    border-radius: 20px; font-size: 16px; z-index: 999;
                    transition: opacity 0.4s;
                `;
                document.body.appendChild(toast);
            }
            toast.innerText = msg;
            toast.style.opacity = '1';
            clearTimeout(toast._timer);
            toast._timer = setTimeout(() => { toast.style.opacity = '0'; }, 1800);
        }

        function startPetRoaming() {
            setInterval(() => {
                const directions = [{x:0,y:1},{x:0,y:-1},{x:1,y:0},{x:-1,y:0}];
                const move = directions[Math.floor(Math.random() * directions.length)];
                let nx = itemPositions.pet.x + move.x;
                let ny = itemPositions.pet.y + move.y;
                if (nx >= 0 && nx <= 7 && ny >= 0 && ny <= 7) {
                    const overlap = (nx === itemPositions.owl.x    && ny === itemPositions.owl.y) ||
                                    (nx === itemPositions.arcade.x  && ny === itemPositions.arcade.y) ||
                                    (nx === itemPositions.house.x   && ny === itemPositions.house.y);
                    if (!overlap) {
                        itemPositions.pet.x = nx;
                        itemPositions.pet.y = ny;
                        alignToGrid("obj-pet", nx, ny);
                        checkProximity(gameState.playerGridX, gameState.playerGridY);
                    }
                }
            }, 3000);
        }

        window.onload = function() {
            loadGame();
            startPetRoaming();
            startWeedSystem();
            syncPetEmoji();
        };

        // 同步寵物 emoji
        function syncPetEmoji() {
            const gs = JSON.parse(localStorage.getItem('AC_Save_' + currentUser) || '{}');
            if (gs.petEmoji) {
                document.getElementById('obj-pet').innerText = gs.petEmoji;
            }
        }

        // 雜草系統
        const WEED_EMOJIS = ['🌿','🌱','🍀','☘️','🌾'];
        let weeds = [];

        function spawnWeed() {
            if (weeds.length >= 3) return;

            // 找空格
            const occupied = new Set();
            occupied.add(`${gameState.playerGridX},${gameState.playerGridY}`);
            Object.values(itemPositions).forEach(p => occupied.add(`${p.x},${p.y}`));
            weeds.forEach(w => occupied.add(`${w.gx},${w.gy}`));

            let gx, gy, tries = 0;
            do {
                gx = Math.floor(Math.random() * 8);
                gy = Math.floor(Math.random() * 8);
                tries++;
            } while (occupied.has(`${gx},${gy}`) && tries < 30);
            if (tries >= 30) return;

            const id = 'weed_' + Date.now();
            const el = document.createElement('div');
            el.className = 'weed';
            el.id = id;
            el.innerText = WEED_EMOJIS[Math.floor(Math.random() * WEED_EMOJIS.length)];
            el.style.left = (gx * 12.5) + '%';
            el.style.top  = (gy * 12.5) + '%';
            el.addEventListener('click',    () => collectWeed(id, el));
            el.addEventListener('touchend', (e) => { e.preventDefault(); collectWeed(id, el); }, { passive: false });
            document.getElementById('gameStage').appendChild(el);
            weeds.push({ id, gx, gy });
        }

        function collectWeed(id, el) {
            const rect = el.getBoundingClientRect();
            weeds = weeds.filter(w => w.id !== id);
            el.remove();
            // 金錢
            const key = 'AC_Save_' + currentUser;
            const gs = JSON.parse(localStorage.getItem(key) || '{}');
            gs.money = (gs.money || 0) + 5;
            gameState.money = gs.money;
            localStorage.setItem(key, JSON.stringify(gs));
            document.getElementById('lblMoney').innerText = gs.money;
            // 特效
            const coin = document.createElement('div');
            coin.className = 'coin-float';
            coin.innerText = '+$5 🌿';
            coin.style.left = rect.left + 'px';
            coin.style.top  = rect.top  + 'px';
            document.body.appendChild(coin);
            setTimeout(() => coin.remove(), 1000);
        }

        function startWeedSystem() {
            // 第一株雜草延遲5秒出現（測試方便）
            setTimeout(spawnWeed, 5000);
            // 之後每15分鐘一株
            setInterval(spawnWeed, 15 * 60 * 1000);
        }
    </script>
</body>
</html>
