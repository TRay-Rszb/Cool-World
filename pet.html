<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>電子寵物 - 小貓</title>
    <style>
        * { box-sizing: border-box; -webkit-user-select: none; user-select: none; }
        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background: linear-gradient(135deg, #fff9c4, #ffe0b2);
            margin: 0; padding: 10px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100dvh;
        }

        .top-bar {
            width: 100%; max-width: 600px;
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 10px;
        }
        .btn-back { background: #5d4037; color: white; border: none; border-radius: 10px; padding: 10px 18px; font-size: 16px; cursor: pointer; font-weight: bold; }
        .money-box { font-size: 18px; font-weight: bold; color: #e65100; background: #fff; padding: 8px 14px; border-radius: 12px; border: 2px solid #ff9800; }

        /* 狀態列 */
        .status-bars {
            width: 100%; max-width: 600px;
            background: white; border-radius: 16px; padding: 14px 18px;
            border: 3px solid #fbc02d; margin-bottom: 10px;
            display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
        }
        .bar-row { display: flex; align-items: center; gap: 8px; }
        .bar-label { font-size: 13px; font-weight: bold; color: #5d4037; width: 48px; flex-shrink: 0; }
        .bar-track { flex: 1; height: 14px; background: #eee; border-radius: 8px; overflow: hidden; }
        .bar-fill { height: 100%; border-radius: 8px; transition: width 0.5s, background 0.5s; }
        .bar-fill.happy   { background: #ff9800; }
        .bar-fill.hunger  { background: #4caf50; }
        .bar-fill.clean   { background: #29b6f6; }
        .bar-fill.energy  { background: #ab47bc; }

        /* 寵物舞台 */
        .pet-stage {
            width: 100%; max-width: 600px;
            background: white; border-radius: 20px;
            border: 4px solid #fbc02d;
            padding: 16px;
            display: flex; flex-direction: column; align-items: center;
            margin-bottom: 12px;
            position: relative;
            min-height: 220px;
        }

        .state-badge {
            position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
            font-size: 14px; font-weight: bold; padding: 4px 14px;
            border-radius: 20px; white-space: nowrap;
        }

        .pet-emoji {
            font-size: 100px;
            margin: 30px 0 10px;
            display: block;
            transition: transform 0.1s;
            cursor: pointer;
            touch-action: none;
        }
        .pet-emoji.bounce { animation: bounce 0.4s ease; }
        .pet-emoji.shake  { animation: shake 0.4s ease; }
        @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-20px)} }
        @keyframes shake  { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-10px)} 75%{transform:translateX(10px)} }

        .speech-bubble {
            background: #fff9c4; border: 3px solid #fbc02d; border-radius: 16px;
            padding: 10px 18px; font-size: 16px; font-weight: bold; color: #5d4037;
            min-height: 44px; text-align: center; width: 90%; max-width: 400px;
            transition: opacity 0.3s;
        }

        /* 撫摸提示 */
        .pet-hint { font-size: 12px; color: #aaa; margin-top: 6px; }

        /* 動作按鈕 */
        .action-grid {
            width: 100%; max-width: 600px;
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
            margin-bottom: 10px;
        }
        .action-btn {
            background: white; border: 3px solid #fbc02d; border-radius: 14px;
            padding: 12px 6px; text-align: center; cursor: pointer;
            transition: background 0.15s, transform 0.1s;
            -webkit-tap-highlight-color: transparent;
        }
        .action-btn:active { background: #fff9c4; transform: scale(0.94); }
        .action-btn .a-icon { font-size: 28px; }
        .action-btn .a-label { font-size: 12px; font-weight: bold; color: #5d4037; margin-top: 4px; }
        .action-btn .a-cost  { font-size: 11px; color: #e65100; margin-top: 2px; }
        .action-btn.earn .a-cost { color: #388e3c; }

        /* 心心特效 */
        .float-heart {
            position: fixed; pointer-events: none; font-size: 28px; z-index: 999;
            animation: floatUp 1s ease forwards;
        }
        @keyframes floatUp {
            0%   { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-80px) scale(1.5); }
        }

        /* 生病/警告 */
        .warning-banner {
            width: 100%; max-width: 600px;
            background: #ffebee; border: 2px solid #f44336; border-radius: 12px;
            padding: 10px 16px; text-align: center; font-weight: bold; color: #c62828;
            font-size: 15px; margin-bottom: 8px; display: none;
        }
    </style>
</head>
<body>

<div class="top-bar">
    <button class="btn-back" onclick="leaveGame()">↩ 返回</button>
    <div style="font-size:20px; font-weight:bold; color:#5d4037;">🐱 小貓咪</div>
    <div class="money-box">💰 $<span id="lblMoney">0</span></div>
</div>

<div class="warning-banner" id="warnBanner">⚠️ 小貓需要你的關注！</div>

<div class="status-bars">
    <div class="bar-row">
        <div class="bar-label">😊 開心</div>
        <div class="bar-track"><div class="bar-fill happy" id="barHappy"></div></div>
    </div>
    <div class="bar-row">
        <div class="bar-label">🍖 飽食</div>
        <div class="bar-track"><div class="bar-fill hunger" id="barHunger"></div></div>
    </div>
    <div class="bar-row">
        <div class="bar-label">🛁 清潔</div>
        <div class="bar-track"><div class="bar-fill clean" id="barClean"></div></div>
    </div>
    <div class="bar-row">
        <div class="bar-label">⚡ 精力</div>
        <div class="bar-track"><div class="bar-fill energy" id="barEnergy"></div></div>
    </div>
</div>

<div class="pet-stage">
    <div class="state-badge" id="stateBadge">😊 開心</div>
    <div class="pet-emoji" id="petEmoji">🐱</div>
    <div class="speech-bubble" id="speechBubble">喵～今天也要好好玩耍！</div>
    <div class="pet-hint">← 左右滑動撫摸我 →</div>
</div>

<div class="action-grid">
    <div class="action-btn" onclick="doAction('feed')">
        <div class="a-icon">🍣</div>
        <div class="a-label">餵食</div>
        <div class="a-cost">-$3</div>
    </div>
    <div class="action-btn earn" onclick="doAction('clean')">
        <div class="a-icon">🛁</div>
        <div class="a-label">清潔</div>
        <div class="a-cost">+$2</div>
    </div>
    <div class="action-btn earn" onclick="doAction('sleep')">
        <div class="a-icon">🌙</div>
        <div class="a-label">哄睡</div>
        <div class="a-cost">+$1</div>
    </div>
    <div class="action-btn earn" onclick="doAction('play')">
        <div class="a-icon">🎾</div>
        <div class="a-label">玩耍</div>
        <div class="a-cost">+$2</div>
    </div>
</div>

<script>
    const currentUser = sessionStorage.getItem('AC_Current_User') || 'Guest';
    const SAVE_KEY = 'AC_Save_' + currentUser;
    const PET_KEY  = 'AC_Pet_'  + currentUser;

    // 狀態定義
    const STATES = {
        happy:  { label: '😊 開心', bg: '#fff9c4', border: '#fbc02d', emoji: '😺', phrases: ['喵～好開心！', '摸摸我吧！', '今天天氣真好呢～', '最喜歡你了！'] },
        hungry: { label: '🍖 肚子餓', bg: '#ffebee', border: '#ef9a9a', emoji: '😿', phrases: ['肚子好餓...', '喵嗚...給我吃東西！', '餓了餓了餓了！'] },
        dirty:  { label: '🧹 好髒髒', bg: '#f3e5f5', border: '#ce93d8', emoji: '🙀', phrases: ['好臭臭...幫我洗澡嘛', '髒兮兮的我不喜歡！', '澡澡澡！'] },
        angry:  { label: '😾 生氣中', bg: '#ffccbc', border: '#ff8a65', emoji: '😾', phrases: ['哼！不理你！', '你都不陪我玩！', '生氣了啦～'] },
        sleepy: { label: '💤 想睡覺', bg: '#e8eaf6', border: '#9fa8da', emoji: '😴', phrases: ['呼嚕呼嚕...', '好睏喔...', 'zzz...'] },
    };

    // 載入寵物狀態
    let pet = {
        happy:  80,
        hunger: 80,
        clean:  80,
        energy: 80,
        lastSaved: Date.now()
    };

    function loadPet() {
        const saved = localStorage.getItem(PET_KEY);
        if (saved) {
            const s = JSON.parse(saved);
            // 時間流逝衰減
            const elapsed = (Date.now() - (s.lastSaved || Date.now())) / 1000 / 60; // 分鐘
            pet.happy   = Math.max(0, s.happy   - elapsed * 1.5);
            pet.hunger  = Math.max(0, s.hunger  - elapsed * 2);
            pet.clean   = Math.max(0, s.clean   - elapsed * 1);
            pet.energy  = Math.max(0, s.energy  - elapsed * 1.2);
        }
    }

    function savePet() {
        pet.lastSaved = Date.now();
        localStorage.setItem(PET_KEY, JSON.stringify(pet));
        // 同步狀態 emoji 回主畫面
        const state = getCurrentState();
        const gs = JSON.parse(localStorage.getItem(SAVE_KEY) || '{}');
        gs.petState = state;
        gs.petEmoji = STATES[state].emoji;
        localStorage.setItem(SAVE_KEY, JSON.stringify(gs));
    }

    function getMoney() {
        const s = localStorage.getItem(SAVE_KEY);
        return s ? (JSON.parse(s).money || 0) : 0;
    }
    function addMoney(n) {
        const key = SAVE_KEY;
        const s = JSON.parse(localStorage.getItem(key) || '{}');
        s.money = (s.money || 0) + n;
        localStorage.setItem(key, JSON.stringify(s));
        document.getElementById('lblMoney').innerText = s.money;
        return s.money;
    }

    function getCurrentState() {
        if (pet.energy < 25)  return 'sleepy';
        if (pet.hunger < 25)  return 'hungry';
        if (pet.clean  < 25)  return 'dirty';
        if (pet.happy  < 25)  return 'angry';
        return 'happy';
    }

    function updateUI() {
        document.getElementById('barHappy').style.width  = pet.happy  + '%';
        document.getElementById('barHunger').style.width = pet.hunger + '%';
        document.getElementById('barClean').style.width  = pet.clean  + '%';
        document.getElementById('barEnergy').style.width = pet.energy + '%';

        const state = getCurrentState();
        const info  = STATES[state];
        document.getElementById('stateBadge').innerText = info.label;
        document.getElementById('stateBadge').style.background = info.bg;
        document.getElementById('stateBadge').style.border = '2px solid ' + info.border;
        document.getElementById('petEmoji').innerText = info.emoji;
        document.getElementById('speechBubble').style.background = info.bg;
        document.getElementById('speechBubble').style.borderColor = info.border;

        // 警告
        const warn = pet.happy < 30 || pet.hunger < 30 || pet.clean < 30 || pet.energy < 30;
        document.getElementById('warnBanner').style.display = warn ? 'block' : 'none';

        document.getElementById('lblMoney').innerText = getMoney();
    }

    function say(msg) {
        const el = document.getElementById('speechBubble');
        el.style.opacity = 0;
        setTimeout(() => { el.innerText = msg; el.style.opacity = 1; }, 200);
    }

    function randomSay() {
        const state = getCurrentState();
        const phrases = STATES[state].phrases;
        say(phrases[Math.floor(Math.random() * phrases.length)]);
    }

    // 動作
    const COOLDOWNS = {};
    function doAction(type) {
        const now = Date.now();
        if (COOLDOWNS[type] && now - COOLDOWNS[type] < 3000) {
            say('等一下再來嘛～');
            return;
        }
        COOLDOWNS[type] = now;

        switch(type) {
            case 'feed':
                if (getMoney() < 3) { say('錢不夠買飼料了！'); return; }
                addMoney(-3);
                pet.hunger = Math.min(100, pet.hunger + 35);
                pet.happy  = Math.min(100, pet.happy  + 10);
                say('好好吃！謝謝你～ 😋');
                animatePet('bounce');
                spawnHearts('🍣', 2);
                break;
            case 'clean':
                if (pet.clean >= 90) { say('我現在很乾淨！不用洗！'); return; }
                addMoney(2);
                pet.clean = Math.min(100, pet.clean + 40);
                pet.happy = Math.min(100, pet.happy  + 5);
                say('洗完好舒服！✨ 賺了$2！');
                animatePet('bounce');
                spawnHearts('💧', 2);
                break;
            case 'sleep':
                if (pet.energy >= 90) { say('我現在不想睡！'); return; }
                addMoney(1);
                pet.energy = Math.min(100, pet.energy + 40);
                say('呼嚕呼嚕...睡得好香 💤 賺了$1！');
                animatePet('bounce');
                spawnHearts('💤', 2);
                break;
            case 'play':
                if (pet.energy < 20) { say('太累了，先讓我休息...'); return; }
                addMoney(2);
                pet.happy  = Math.min(100, pet.happy  + 30);
                pet.energy = Math.max(0,   pet.energy - 15);
                pet.hunger = Math.max(0,   pet.hunger - 10);
                say('玩得好開心！🎾 賺了$2！');
                animatePet('bounce');
                spawnHearts('⭐', 3);
                break;
        }
        updateUI();
        savePet();
    }

    function animatePet(cls) {
        const el = document.getElementById('petEmoji');
        el.classList.remove('bounce', 'shake');
        void el.offsetWidth;
        el.classList.add(cls);
        setTimeout(() => el.classList.remove(cls), 500);
    }

    function spawnHearts(emoji, count) {
        const el = document.getElementById('petEmoji');
        const rect = el.getBoundingClientRect();
        for (let i = 0; i < count; i++) {
            setTimeout(() => {
                const h = document.createElement('div');
                h.className = 'float-heart';
                h.innerText = emoji;
                h.style.left = (rect.left + rect.width/2 - 14 + (Math.random()-0.5)*60) + 'px';
                h.style.top  = (rect.top  - 10) + 'px';
                document.body.appendChild(h);
                setTimeout(() => h.remove(), 1000);
            }, i * 150);
        }
    }

    // 撫摸偵測（左右滑動）
    let touchStartX = null;
    let lastPetTime = 0;
    let strokeCount = 0;

    const petEl = document.getElementById('petEmoji');
    petEl.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
    petEl.addEventListener('touchmove', e => {
        if (touchStartX === null) return;
        const dx = Math.abs(e.touches[0].clientX - touchStartX);
        if (dx > 30) {
            touchStartX = e.touches[0].clientX;
            const now = Date.now();
            if (now - lastPetTime > 300) {
                lastPetTime = now;
                onPetStroke();
            }
        }
    }, { passive: true });
    petEl.addEventListener('mousedown', e => { touchStartX = e.clientX; });
    document.addEventListener('mousemove', e => {
        if (touchStartX === null) return;
        const dx = Math.abs(e.clientX - touchStartX);
        if (dx > 30) {
            touchStartX = e.clientX;
            const now = Date.now();
            if (now - lastPetTime > 300) {
                lastPetTime = now;
                onPetStroke();
            }
        }
    });
    document.addEventListener('mouseup', () => { touchStartX = null; });

    function onPetStroke() {
        strokeCount++;
        pet.happy = Math.min(100, pet.happy + 3);
        animatePet('bounce');
        spawnHearts('💕', 1);

        if (strokeCount % 5 === 0) {
            say('好舒服喔～再多摸一點！💕');
            addMoney(1);
            updateUI();
            savePet();
        } else {
            const msgs = ['喵～', '呼嚕呼嚕...', '好舒服～', '再摸一下！'];
            say(msgs[Math.floor(Math.random() * msgs.length)]);
        }
    }

    // 自動說話
    setInterval(randomSay, 8000);

    // 自動衰減（每分鐘）
    setInterval(() => {
        pet.happy   = Math.max(0, pet.happy   - 1.5);
        pet.hunger  = Math.max(0, pet.hunger  - 2);
        pet.clean   = Math.max(0, pet.clean   - 1);
        pet.energy  = Math.max(0, pet.energy  - 1.2);
        updateUI();
        savePet();
    }, 60000);

    function leaveGame() {
        savePet();
        window.location.href = 'main.html';
    }

    // 初始化
    loadPet();
    updateUI();
    randomSay();

    // 小彩蛋：連續撫摸10次
    setInterval(() => {
        if (strokeCount > 0 && Date.now() - lastPetTime > 5000) strokeCount = 0;
    }, 5000);
</script>
</body>
</html>
